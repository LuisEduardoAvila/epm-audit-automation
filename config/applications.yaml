# Application Type Registry
types:
  FCCS:
    name: "Financial Consolidation and Close"
    modules:
      - journals
      - consolidation
      - supplemental_data
      - intercompany
      - task_manager
      - enterprise_journals
    audit_endpoints:
      - artifact_updates
      - journals
      - consolidation_rules
      - dimensions
      
  PBCS:
    name: "Planning and Budgeting"
    modules:
      - forms
      - business_rules
      - approval_workflows
      - task_lists
      - security_filters
    audit_endpoints:
      - artifact_updates
      - rules
      - forms
      - approvals
      
  EDM:
    name: "Enterprise Data Management"
    modules:
      - requests
      - views
      - nodes
      - mappings
      - policies
    audit_endpoints:
      - requests
      - deployments
      - violations
      
  DATA_EXCHANGE:
    name: "Data Exchange"
    modules:
      - load_rules
      - mappings
      - executions
      - imports
      - exports
    audit_endpoints:
      - load_rules
      - executions
      - error_logs
      
  ARCS:
    name: "Account Reconciliation"
    modules:
      - reconciliations
      - formats
      - profiles
      - matching_rules
    audit_endpoints:
      - reconciliations
      - profiles
      - transactions
      
  TRCS:
    name: "Tax Reporting"
    modules:
      - tax_provision
      - returns
      - compliance
    audit_endpoints:
      - provisions
      - adjustments
      
  PCM:
    name: "Profitability and Cost Management"
    modules:
      - allocations
      - stages
      - drivers
      - traceability
    audit_endpoints:
      - allocations
      - stages

# Environment Definitions
environments:
  production:
    name: "Production"
    description: "Live production systems"
    security_level: "high"
    change_control: "strict"
    sox_relevant: true
    backup_required: true
    dr_replicated: true
    
  test:
    name: "Test/QA"
    description: "Testing and validation environment"
    security_level: "medium"
    change_control: "standard"
    sox_relevant: false
    backup_required: false
    refresh_from_prod: true
    
  development:
    name: "Development"
    description: "Development and experimentation"
    security_level: "low"
    change_control: "relaxed"
    sox_relevant: false
    backup_required: false
    auto_refresh: false

# OAuth Configuration
oauth:
  production_suite:
    name: "Production Suite OAuth"
    description: "Shared OAuth for all production EPM apps"
    token_url: "https://idcs-xyz.identity.oraclecloud.com/oauth2/v1/token"
    client_id_ref: "oci_vault://oauth-client-id-prod"
    client_secret_ref: "oci_vault://oauth-client-secret-prod"
    scope: "urn:opc:idm:tac.scope.epm"
    applications:
      - fccs_prod
      - pbcs_prod
      - edm_prod
      - dataexchange_prod
      - arcs_prod
      
  test_suite:
    name: "Test Suite OAuth"
    description: "Shared OAuth for all test EPM apps"
    token_url: "https://idcs-xyz.identity.oraclecloud.com/oauth2/v1/token"
    client_id_ref: "oci_vault://oauth-client-id-test"
    client_secret_ref: "oci_vault://oauth-client-secret-test"
    scope: "urn:opc:idm:tac.scope.epm"
    applications:
      - fccs_test
      - pbcs_test
      
  development_suite:
    name: "Development Suite OAuth"
    description: "Shared OAuth for all dev EPM apps"
    token_url: "https://idcs-xyz.identity.oraclecloud.com/oauth2/v1/token"
    client_id_ref: "oci_vault://oauth-client-id-dev"
    client_secret_ref: "oci_vault://oauth-client-secret-dev"
    scope: "urn:opc:idm:tac.scope.epm"
    applications:
      - fccs_dev
      - pbcs_dev

# Audit Configuration
audit:
  default_schedule:
    production:
      artifact_report: "daily 02:00"
      security_report: "weekly sunday 03:00"
      access_review: "monthly 1st 04:00"
      
    test:
      artifact_report: "weekly monday 02:00"
      security_report: "weekly monday 03:00"
      
    development:
      artifact_report: "on_demand"
      security_report: "on_demand"
      
  retention:
    production: "7_years"
    test: "1_year"
    development: "90_days"
    
  alerting:
    production:
      sox_critical: "immediate_email"
      material_changes: "daily_digest"
      operational: "weekly_summary"
      
    test:
      sox_critical: "daily_digest"
      material_changes: "weekly_summary"
      
    development:
      all: "weekly_summary"
