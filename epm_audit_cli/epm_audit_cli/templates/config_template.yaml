# EPM Audit CLI Configuration
# Generated by 'epm config init'
# 
# This file configures EPM Cloud applications for audit operations.
# Update the values below to match your EPM environment.

# Default settings applied to all applications
defaults:
  # Default output format (table, json, csv)
  output_format: table
  # Default timeout for API requests (seconds)
  timeout: 30
  # Enable verbose logging
  verbose: false
  # Default number of results to return
  default_limit: 50

# Application definitions
applications:
  # Example: FCCS Production
  # Replace 'fccs_prod' with your application ID
  fccs_prod:
    # Application type: fccs, edm, planning, pbcs
    type: fccs
    # Descriptive name
    name: "Financial Consolidation and Close Production"
    # EPM Cloud base URL
    url: "https://<pod>.epm.usphoenix1.oraclevcn.com"
    # Identity domain / POD identifier
    identity_domain: "<pod>"
    # Environment: prod, test, dev
    environment: prod
    # Optional: REST API version (default: latest)
    api_version: "v3"
    # Optional: Default artifact types to track
    # artifact_types:
    #   - CALCULATION
    #   - BUSINESS_RULE
    #   - DIMENSION
    #   - RULE_SET
    # Optional: EDM configuration (if type is edm)
    # edm_settings:
    #   policy_id: "SOX_COMPLIANCE"
    #   auto_approve_threshold: "LOW"
    # Optional: OCI compartment OCID for IAM commands
    # compartment_ocid: "ocid1.compartment.xxx"

  # Example: Planning Production
  # pbcs_prod:
  #   type: planning
  #   name: "Planning Production"
  #   url: "https://<pod>.pbcs.usphoenix1.oraclevcn.com"
  #   identity_domain: "<pod>"
  #   environment: prod

  # Example: EDM Production
  # edm_prod:
  #   type: edm
  #   name: "Enterprise Data Management Production"
  #   url: "https://<pod>.edm.usphoenix1.oraclevcn.com"
  #   identity_domain: "<pod>"
  #   environment: prod

# Optional: OCI configuration for infrastructure commands
# oci:
#   # Default compartment OCID (used if not specified in command)
#   compartment_ocid: "ocid1.compartment.xxx"
#   # OCI region
#   region: "us-phoenix-1"
#   # Tenancy OCID
#   tenancy_ocid: "ocid1.tenancy.xxx"

# Optional: Credential settings
# credentials:
#   # Backend for storing credentials: oci_vault, keyring
#   backend: oci_vault
#   # Vault OCID (if using OCI Vault)
#   vault_ocid: "ocid1.vault.xxx"
#   # Secret OCIDs for different applications
#   # secrets:
#   #   fccs_prod: "ocid1.secret.xxx"

# Optional: Token settings
# tokens:
#   # Backend for storing tokens: keyring, file, env
#   # Note: keyring is recommended for security
#   backend: keyring
#   # Token expiration (hours)
#   expiration_hours: 24